<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicXML Horizontal Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@latest/build/opensheetmusicdisplay.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: white; overflow: hidden; font-family: sans-serif; }
        #score-container {
            width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .zoom-btn, .refresh-btn, .play-btn, .tempo-display {
            position: fixed; top: 10px; height: 44px;
            border-radius: 22px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.6); color: #333;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(4px);
        }
        .zoom-btn, .play-btn { width: 44px; cursor: pointer; }
        #btn-minus { left: 10px; font-size: 24px; font-weight: bold; }
        #btn-play { left: 65px; font-size: 20px; color: #27ae60; }
        .tempo-display { left: 120px; padding: 0 15px; font-size: 14px; font-weight: bold; pointer-events: none; }
        #btn-refresh { right: 65px; width: 44px; padding: 8px; cursor: pointer; }
        #btn-plus { right: 10px; width: 44px; font-size: 24px; font-weight: bold; cursor: pointer; }
        svg { width: 24px; height: 24px; }
    </style>
</head>
<body>

    <div id="btn-minus" class="zoom-btn" onclick="changeZoom(-0.1)">−</div>
    <div id="btn-play" class="play-btn" onclick="togglePlay()">▶</div>
    <div id="tempo-val" class="tempo-display">BPM: --</div>
    
    <div id="btn-refresh" class="refresh-btn" onclick="refreshMusic()">
        <svg viewBox="0 0 24 24" fill="#371a94"><path d="M16.3788 6.20698C15.1885 5.25459 13.7434 4.5 12 4.5C7.85787 4.5 4.5 7.85786 4.5 12C4.5 16.1421 7.85787 19.5 12 19.5C15.2549 19.5 18.028 17.4254 19.0646 14.5256C19.2505 14.0055 19.775 13.6568 20.3153 13.7713L21.2935 13.9787C21.8338 14.0932 22.1836 14.6262 22.0179 15.1531C20.6787 19.4112 16.7016 22.5 12 22.5C6.20101 22.5 1.5 17.799 1.5 12C1.5 6.20101 6.20101 1.5 12 1.5C14.7835 1.5 16.9516 2.76847 18.5112 4.0746L20.2929 2.29289C20.5789 2.00689 21.009 1.92134 21.3827 2.07612C21.7564 2.2309 22 2.59554 22 3V8.5C22 9.05228 21.5523 9.5 21 9.5H15.5C15.0956 9.5 14.7309 9.25636 14.5761 8.88268C14.4214 8.50901 14.5069 8.07889 14.7929 7.79289L16.3788 6.20698Z"/></svg>
    </div>
    <div id="btn-plus" class="zoom-btn" onclick="changeZoom(0.1)">+</div>

    <div id="score-container"></div>

<script>
    let osmd;
    let currentZoom = 1.0;
    let isPlaying = false;
    let playbackTimeout;
    let detectedBPM = 120;

    function getFileNameFromQuery() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('file'); 
    }

    const fileName = getFileNameFromQuery();
    const xmlPath = fileName ? `${fileName}/${fileName}.xml` : null;

    function extractTempo(xmlString) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlString, "text/xml");
        const soundTag = xmlDoc.querySelector('sound[tempo]');
        return soundTag ? parseInt(soundTag.getAttribute('tempo')) : 120;
    }

    function initOSMD() {
        osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("score-container", {
            autoResize: true,
            backend: "canvas",
            drawingParameters: "compacttight",
            renderSingleHorizontalStaffline: true,
            followCursor: true,
            drawPartNames: true // Shows voice names (Main, Seconds, Thirds)
        });
    }

    function togglePlay() {
        if (!isPlaying) {
            isPlaying = true;
            document.getElementById('btn-play').innerText = "■";
            document.getElementById('btn-play').style.color = "#c0392b";
            playNextStep();
        } else {
            stopPlayback();
        }
    }

    function stopPlayback() {
        isPlaying = false;
        document.getElementById('btn-play').innerText = "▶";
        document.getElementById('btn-play').style.color = "#27ae60";
        clearTimeout(playbackTimeout);
        osmd.cursor.reset();
        document.getElementById('score-container').scrollTo({ left: 0, behavior: 'smooth' });
    }

    function playNextStep() {
        if (!isPlaying) return;

        // Correct Multi-Voice Logic:
        // Instead of looking at one note, we look at the 'timestamp' duration 
        // until the next musical event in ANY voice.
        const currentFraction = osmd.cursor.Iterator.currentTimeStamp.RealValue;
        osmd.cursor.next();
        const nextFraction = osmd.cursor.Iterator.currentTimeStamp.RealValue;
        
        // Calculate the difference in duration
        const durationDiff = nextFraction - currentFraction;
        
        const msPerBeat = (60 / detectedBPM) * 1000;
        const delay = (durationDiff * 4) * msPerBeat;

        // Auto-scroll logic
        const cursorElement = osmd.cursor.cursorElement;
        if (cursorElement) {
            const offset = cursorElement.getBoundingClientRect().left;
            if (offset > window.innerWidth * 0.7) {
                document.getElementById('score-container').scrollBy({ left: 250, behavior: 'smooth' });
            }
        }

        if (osmd.cursor.iterator.EndReached) {
            stopPlayback();
        } else {
            playbackTimeout = setTimeout(playNextStep, delay);
        }
    }

    function loadMusic(forceRefresh = false) {
        if (!xmlPath) return;
        const cachedXML = localStorage.getItem(xmlPath);
        
        const processData = (data) => {
            detectedBPM = extractTempo(data);
            document.getElementById('tempo-val').innerText = `BPM: ${detectedBPM}`;
            osmd.load(data).then(() => {
                osmd.zoom = currentZoom;
                osmd.render();
                osmd.cursor.show();
            });
        };

        if (cachedXML && !forceRefresh) {
            processData(cachedXML);
        } else {
            fetch(xmlPath + '?nocache=' + new Date().getTime()).then(r => r.text()).then(data => {
                localStorage.setItem(xmlPath, data);
                processData(data);
            });
        }
    }

    function refreshMusic() { if (confirm("Refresh Sheet?")) loadMusic(true); }
    function changeZoom(delta) { if (!osmd) return; currentZoom = Math.max(0.3, Math.min(3.0, currentZoom + delta)); osmd.zoom = currentZoom; osmd.render(); osmd.cursor.show(); }

    if (fileName) {
        initOSMD();
        loadMusic();
    }
</script>
</body>
</html>
