<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Vigil SMC 2026</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #c0392b;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: #2980b9;
            font-size: 1.2em;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #e74c3c;
        }

        table {
            width: auto; /* Set to auto for centering */
            margin: 20px auto; /* Center the table */
            border-collapse: collapse; /* Collapse borders */

            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 10px;
            border: 1px solid #add8e6; /* Light blue border */
            text-align: center;
        }

        th {
            font-weight: bold;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #777;
        }

    </style>
</head>
<body>
    <h1>Easter Vigil SMC 2026</h1>
<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <ellipse cx="100" cy="70" rx="30" ry="40" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="80" r="3" fill="black"/>
  <circle cx="110" cy="80" r="3" fill="black"/>
  
  <!-- Smile -->
  <path d="M 90 90 Q 100 100, 110 90" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Chest -->
  <rect x="85" y="100" width="30" height="40" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Arms -->
  <line x1="80" y1="120" x2="100" y2="140" stroke="black" stroke-width="2"/>
  <line x1="120" y1="120" x2="140" y2="140" stroke="black" stroke-width="2"/>
  
  <!-- Hands -->
  <circle cx="90" cy="140" r="5" fill="black"/>
  <circle cx="110" cy="140" r="5" fill="black"/>
  
  <!-- Body -->
  <line x1="100" y1="150" x2="100" y2="180" stroke="black" stroke-width="2"/>
  
  <!-- Legs -->
  <line x1="90" y1="180" x2="110" y2="180" stroke="black" stroke-width="2"/>
  <line x1="85" y1="190" x2="115" y2="190" stroke="black" stroke-width="2"/>
</svg>

   <div id="linksContainer"></div>

    <div class="footer">
        &copy; 2026 Erryl Alvares
    </div>

    <script>
        // Array of links
        const links = [
            { name: "Ent: New Life", href: "" },
            { name: "Lord Have Mercy", href: "LHMYouth" },
            { name: "Gloria", href: "" },
            { name: "Acc", href: "AccSeekYeDavidsCty" },
            { name: "Off: C3", href: "" },
            { name: "Holy", href: "" },
            { name: "Comm: Jezu mhojea", href: "" },
            { name: "Rec: ", href: "" }
        ];

        // Function to create a table of links
        function createLinksTable(h1,h2,h3,h4, f1, f2, f3,f4) {
            const table = document.createElement('table');
            
            let cell = '';
            let link = '';
            let row = '';

            //Setup Table header
            row = document.createElement('tr');
            cell = document.createElement('th');
            cell.innerHTML = "LYRICS";
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h1;
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h2;
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h3;
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h4;
            row.appendChild(cell);
            
            table.appendChild(row);

            
            // Create rows and columns
            for (let i = 0; i < links.length; i += 1) {
                    row = document.createElement('tr');

                    //Hymn Lyrics
                    cell = document.createElement('td');
                     link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "Sheet.pdf" );
                     link.textContent = "Sheet";
                     cell.appendChild(link);
			//  cell.appendChild(document.createElement('br'));
            //         link = document.createElement('a');
            //         link.href = baseURL.concat("LyricsA.htm?file=", links[i].href);
            //         link.textContent = links[i].name;
            //         cell.appendChild(link);
                     row.appendChild(cell);

                    //Sheet
                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f1);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V1.mp3" );
                    link.textContent = links[i].name;
                    cell.appendChild(link);
                    row.appendChild(cell);

                    //Chords
                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f2);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V2.mp3");
                    link.textContent = links[i].name;
                    cell.appendChild(link);
                    row.appendChild(cell);

                    //Intro
                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f3);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V3.mp3");
                    link.textContent = links[i].name;
                    cell.appendChild(link);


                    row.appendChild(cell);

                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f4);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V4.mp3");
                    link.textContent = links[i].name;
                    cell.appendChild(link);


                    row.appendChild(cell);
                
                table.appendChild(row);
            }

            document.getElementById('linksContainer').appendChild(table);
        }

        // Check for query string parameter
        const urlParams = new URLSearchParams(window.location.search);
        const baseURL = "https://eeaatech.github.io/Easter2026/"
        
        if (urlParams.get('ea') === 'TTM') {
            createLinksTable("SHEET", "CHORDS", "INTRO", " ", "Sheet.pdf", "Chords.png", "Intro.pdf", "404");
        } else {
            createLinksTable("VOICE 1", "VOICE 2", "VOICE 3", "VOICE 4", "1.m4a", "2.m4a", "3.m4a", "4.m4a");
        }
    </script>
</body>
</html>
