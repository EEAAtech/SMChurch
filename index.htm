<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Vigil SMC 2026</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #c0392b;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        .header-wrapper {
            display: flex;
            justify-content: center;  /* centers horizontally */
            margin-top: 2rem;
        }
        
        .header-row {
            display: flex;
            align-items: center;   /* vertical alignment */
            gap: 0.5rem;           /* space between icon and text */
            height: 5em;           /* fixed height */
        }

        .header-row svg {
            height: 3em;           /* same height as text */
            width: auto;           /* maintain proportions */
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: #2980b9;
            font-size: 1.2em;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #e74c3c;
        }

        table {
            width: auto; /* Set to auto for centering */
            margin: 20px auto; /* Center the table */
            border-collapse: collapse; /* Collapse borders */

            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 10px;
            border: 1px solid #add8e6; /* Light blue border */
            text-align: center;
        }

        th {
            font-weight: bold;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #777;
        }

    </style>
</head>
<body>
<div class="header-wrapper">
  <div class="header-row">

    <!-- Minimalist Risen Christ SVG -->
    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <g  stroke="black" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="256" cy="90" r="50"/>
        <circle cx="256" cy="130" r="40"/>
        <path d="M180 220 Q256 190 332 220 L370 420 Q256 460 142 420 Z"/>
        <path d="M180 230 Q100 180 80 120"/>
        <path d="M332 230 Q412 180 432 120"/>
        <circle cx="80" cy="115" r="10"/>
        <circle cx="432" cy="115" r="10"/>
        <line x1="390" y1="110" x2="390" y2="350"/>
        <path d="M390 110 Q460 130 390 160"/>
        <path d="M390 160 Q460 180 390 210"/>
        <circle cx="256" cy="300" r="8"/>
      </g>
    </svg>

    <h1>Easter Vigil SMC 2026</h1>

  </div>
</div>

   <div id="linksContainer"></div>

    <div class="footer">
        &copy; 2026 Erryl Alvares
    </div>

    <script>
        // Array of links
        const links = [
            
            { name: "Lord Have Mercy", href: "LHMYouth" },
            { name: "Gloria", href: "GloryDanS" },
            { name: "Acc", href: "AccSeekYeDavidsCty" },
            { name: "Off: AmchimChitnam", href: "AmchimChitnam" },
            { name: "Holy", href: "HolyOfIpshita" },
            { name: "Comm: ", href: "JezuMhojea" },
            { name: "PComm: ", href: "" },
            { name: "Rec: ", href: "" }
        ];

        // Function to create a table of links
        function createLinksTable(h1,h2,h3,h4, f1, f2, f3,f4) {
            const table = document.createElement('table');
            
            let cell = '';
            let link = '';
            let row = '';

            //Setup Table header
            row = document.createElement('tr');
            cell = document.createElement('th');
            cell.innerHTML = "LYRICS";
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h1;
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h2;
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h3;
            row.appendChild(cell);

            cell = document.createElement('th');
            cell.innerHTML = h4;
            row.appendChild(cell);
            
            table.appendChild(row);

            
            // Create rows and columns
            for (let i = 0; i < links.length; i += 1) {
                    row = document.createElement('tr');

                    //Hymn Lyrics
                    cell = document.createElement('td');
                     link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "Sheet.pdf" );
                     link.textContent = "Sheet";
                     cell.appendChild(link);
			 cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href = baseURL.concat("MuXml.htm?file=", links[i].href);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
                     row.appendChild(cell);

                    //Sheet
                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f1);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V1.mp3" );
                    link.textContent = links[i].name;
                    cell.appendChild(link);
                    row.appendChild(cell);

                    //Chords
                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f2);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V2.mp3");
                    link.textContent = links[i].name;
                    cell.appendChild(link);
                    row.appendChild(cell);

                    //Intro
                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f3);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V3.mp3");
                    link.textContent = links[i].name;
                    cell.appendChild(link);


                    row.appendChild(cell);

                    cell = document.createElement('td');
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, f4);
                    link.textContent = links[i].name;
                    cell.appendChild(link);
			cell.appendChild(document.createElement('br'));
                    link = document.createElement('a');
                    link.href =  baseURL.concat(links[i].href, "/", links[i].href, "V4.mp3");
                    link.textContent = links[i].name;
                    cell.appendChild(link);


                    row.appendChild(cell);
                
                table.appendChild(row);
            }

            document.getElementById('linksContainer').appendChild(table);
        }

        // Check for query string parameter
        const urlParams = new URLSearchParams(window.location.search);
        // Determine the baseURL dynamically based on the current script location
        const baseURL = window.location.protocol + "//" + window.location.host + "/Easter2026/";
        
        
        if (urlParams.get('ea') === 'TTM') {
            createLinksTable("SHEET", "CHORDS", "INTRO", " ", "Sheet.pdf", "Chords.png", "Intro.pdf", "404");
        } else {
            createLinksTable("VOICE 1", "VOICE 2", "VOICE 3", "VOICE 4", "1.m4a", "2.m4a", "3.m4a", "4.m4a");
        }


        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully.'))
                    .catch(err => {
                        console.error('Service Worker registration failed:', err);
                        // Optionally, you could show a message to the user or perform another action that makes sense for your application when Service Workers fail to register.
                    });
            });
        } else {
            console.log('This browser does not support service workers.');
        }

        async function listCacheNames() {
            const cacheNames = await caches.keys();
            console.log('Available caches:', cacheNames);
        }
        listCacheNames();

        async function listUrlsInCache(cacheName) {
        const cache = await caches.open(cacheName);
        const requests = await cache.keys();
        const urls = requests.map(request => request.url);
        console.log(`URLs in cache "${cacheName}":`, urls);
        }
        // Example: list items in a cache named 'choir-app-v1'
        listUrlsInCache('choir-app-v1');


    </script>
</body>
</html>
